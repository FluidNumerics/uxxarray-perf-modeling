# Fresh environment for stage 04 (production-scale ~20 GB Atlantic reproducer).
#
#   pixi run make    # generate the ~20 GB GLORYS-scale dataset (writes data/atlantic/)
#   pixi run bench   # lazy-dask vs in-RAM time-window advection
#
# Conda-forge scientific stack + Parcels v4 (alpha) from git, same as stage 03.
[workspace]
name = "uxxperf-04-atlantic"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.11"
numpy = ">=2.1.0"
dask = ">=2024.5.1"
netcdf4 = ">=1.7.2"
xarray = ">=2024.5.0"
zarr = ">=3"
pandas = ">=2.2"
pyarrow = ">=20.0.0"
uxarray = ">=2026.04.1"
xgcm = ">=0.9.0"
cf_xarray = ">=0.8.6"
cftime = ">=1.6.3"
pooch = ">=1.8.0"
polars = ">=1.31.0"
tqdm = ">=4.50.0"

[pypi-dependencies]
parcels = { git = "https://github.com/Parcels-Code/Parcels.git" }

[tasks]
make = "python make_atlantic.py --target-gb 20 --out data/atlantic"
bench = "python run_atlantic.py --runtime-days 2 --npart 200 --mode both"
